<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Clock body -->
  <circle cx="32" cy="36" r="24" fill="none" stroke="#5E35B1" stroke-width="4"/>
  <!-- Top button -->
  <rect x="28" y="6" width="8" height="8" rx="2" fill="#5E35B1"/>
  <!-- Left wing -->
  <line x1="16" y1="16" x2="22" y2="22" stroke="#5E35B1" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right wing -->
  <line x1="48" y1="16" x2="42" y2="22" stroke="#5E35B1" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Checkmark inside clock -->
  <polyline points="22,36 29,44 42,28" fill="none" stroke="#5E35B1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
